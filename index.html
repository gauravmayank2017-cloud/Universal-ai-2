<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOICE-FLIP AI</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .upload-zone { border: 2px dashed #00ff41; padding: 40px; margin: 20px auto; width: 60%; cursor: pointer; }
        #preview { width: 60%; margin-top: 20px; display: none; border: 1px solid #00ff41; }
        .btn { background: #00ff41; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin: 10px; }
        .loading { display: none; color: yellow; font-weight: bold; }
    </style>
</head>
<body>
    <h1>>> VOICE_FLIP_AI_v1.0</h1>
    <div class="upload-zone" onclick="document.getElementById('videoInput').click()">
        DROP VIDEO FILE OR CLICK TO UPLOAD
        <input type="file" id="videoInput" hidden accept="video/*">
    </div>
    
    <select id="voiceType" class="btn" style="background: transparent; color: #00ff41; border: 1px solid #00ff41;">
        <option value="deep">Deep Male Voice</option>
        <option value="soft">Soft Female Voice</option>
        <option value="robot">Cybernetic Robot</option>
    </select>

    <button class="btn" onclick="processVideo()">START VOICE TRANSFORMATION</button>
    <div id="status" class="loading">PROCESSING NEURAL AUDIO...</div>
    <video id="preview" controls></video>

    <script type="module" src="app.js"></script>
</body>
</html>
