<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GHOST AI | OS</title>
    <style>
        body { background: #050505; color: #00f3ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #terminal { width: 80%; height: 400px; border: 1px solid #00f3ff; padding: 20px; overflow-y: auto; background: rgba(0,20,20,0.5); box-shadow: 0 0 20px #00f3ff33; margin-bottom: 20px; }
        .input-area { width: 80%; display: flex; gap: 10px; }
        input { flex: 1; background: transparent; border: 1px solid #00f3ff; color: #00f3ff; padding: 15px; outline: none; }
        button { background: #00f3ff; color: black; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; }
        .glitch { text-shadow: 2px 2px #ff00ff; animation: scan 2s infinite; }
        @keyframes scan { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1 class="glitch">SYSTEM_GHOST_v1.0</h1>
    <div id="terminal">>> STANDING BY FOR COMMAND...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a command to Gemini...">
        <button onclick="execute()">EXECUTE</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
